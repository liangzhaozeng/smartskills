# Template — populate with real values before applying.
# For production, use AWS Secrets Manager with External Secrets Operator
# or seal with kubeseal instead of committing base64 values.
#
# To create from literal values:
#   kubectl create secret generic skills-directory-secrets \
#     --namespace=skills-directory \
#     --from-literal=DATABASE_URL="postgresql://user:pass@rds-host:5432/skills_directory?sslmode=require" \
#     --from-literal=NEXTAUTH_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=REDIS_URL="redis://elasticache-host:6379" \
#     --from-literal=OIDC_ISSUER="" \
#     --from-literal=OIDC_CLIENT_ID="" \
#     --from-literal=OIDC_CLIENT_SECRET=""
apiVersion: v1
kind: Secret
metadata:
  name: skills-directory-secrets
  namespace: skills-directory
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@rds-host:5432/skills_directory?sslmode=require"
  NEXTAUTH_SECRET: "CHANGE_ME"
  REDIS_URL: "redis://elasticache-host:6379"
  OIDC_ISSUER: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
